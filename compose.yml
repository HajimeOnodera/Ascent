services:
  mongodb:
    image: mongo:latest
    container_name: ascent-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:latest
    container_name: ascent-redis
    ports:
      - "6379:6379"

  friend-service:
    build:
      context: .
      dockerfile: service.friend/Dockerfile
    container_name: ascent-friend-service
    depends_on:
      - mongodb
      - redis
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_HOST=redis

  proxy:
    build:
      context: .
      dockerfile: core-proxy/Dockerfile
    container_name: ascent-proxy
    ports:
      - "25577:25577"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - ASCENT_SERVER_NAME=proxy

  lobby:
    build:
      context: .
      dockerfile: core-lobby/Dockerfile
    container_name: ascent-lobby
    depends_on:
      - redis
      - mongodb
    environment:
      - REDIS_HOST=redis
      - MONGODB_URI=mongodb://mongodb:27017
      - ASCENT_SERVER_NAME=lobby-1
      - ASCENT_ADVERTISE_HOST=lobby

  skyblock:
    build:
      context: .
      dockerfile: core-skyblock/Dockerfile
    container_name: ascent-skyblock
    depends_on:
      - redis
      - mongodb
    environment:
      - REDIS_HOST=redis
      - MONGODB_URI=mongodb://mongodb:27017
      - ASCENT_SERVER_NAME=skyblock-1
      - ASCENT_ADVERTISE_HOST=skyblock

volumes:
  mongodb_data:
