services:
  lobby:
    build:
      context: .
      dockerfile: docker/minestom/Dockerfile
      args:
        MODULE: core-lobby
        JAR_NAME: CoreLobby
    image: ascent/lobby:local
    restart: unless-stopped
    stop_grace_period: 20s
    expose:
      - "25567"
    environment:
      ASCENT_SERVER_PORT: "25567"
      ASCENT_VELOCITY_SECRET_FILE: /app/forwarding.secret
    secrets:
      - source: velocity_forwarding_secret
        target: /app/forwarding.secret

  skyblock:
    build:
      context: .
      dockerfile: docker/minestom/Dockerfile
      args:
        MODULE: core-skyblock
        JAR_NAME: CoreSkyblock
    image: ascent/skyblock:local
    restart: unless-stopped
    stop_grace_period: 20s
    expose:
      - "25566"
    environment:
      ASCENT_SERVER_PORT: "25566"
      ASCENT_VELOCITY_SECRET_FILE: /app/forwarding.secret
    secrets:
      - source: velocity_forwarding_secret
        target: /app/forwarding.secret

  velocity:
    build:
      context: .
      dockerfile: docker/velocity/Dockerfile
    image: ascent/velocity:local
    restart: unless-stopped
    stop_grace_period: 20s
    depends_on:
      - lobby
      - skyblock
    ports:
      - "25565:25565"
    secrets:
      - source: velocity_forwarding_secret
        target: /app/forwarding.secret

secrets:
  velocity_forwarding_secret:
    file: ${VELOCITY_SECRET_FILE:-./deploy/docker/forwarding.secret.example}
